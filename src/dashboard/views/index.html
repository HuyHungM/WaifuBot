<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title><%= client?.user?.username %></title>
    <link rel="shortcut icon" href="/assets/logo.png" type="image/png" />
    <!-- MATERIAL ICON -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <!-- STYLESHEET -->
    <link rel="stylesheet" href="/css/animation.css" />
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/index.css" />
  </head>
  <body onload="loadPage()" class="dark-theme">
    <div id="loader">
      <div class="loading">
        <span></span>
      </div>
    </div>

    <div id="container">
      <!-- NAVBAR -->
      <nav id="navbar">
        <div class="center">
          <a href="#" class="name hover-glow"
            ><img src="/assets/images/logo.png" class="logo" />
            <span class="bubble-text"><%= client.user.username %></span></a
          >
          <ul class="social-credit">
            <li class="hover-glow">
              <a href="#">
                <i class="fa-brands fa-discord"></i>
              </a>
            </li>
            <li class="hover-glow">
              <a href="#">
                <i class="fa-brands fa-youtube"></i>
              </a>
            </li>
            <li class="hover-glow">
              <a href="#">
                <i class="fa-brands fa-tiktok"></i>
              </a>
            </li>
            <li class="hover-glow">
              <a href="#">
                <i class="fa-brands fa-instagram"></i>
              </a>
            </li>
            <li class="hover-glow">
              <a href="#">
                <i class="fa-brands fa-x-twitter"></i>
              </a>
            </li>
            <li class="hover-glow">
              <a href="#">
                <i class="fa-brands fa-github"></i>
              </a>
            </li>
          </ul>
        </div>
      </nav>

      <!-- INTRODUCE -->
      <section id="introduce">
        <h2 class="bubble-text hover-glow">Introducing</h2>
        <h1>
          <span class="bubble-text">Waifu</span>
          <span class="bubble-text hover-glow">Bot</span>
        </h1>
        <div class="intro-button">
          <a id="invite" href="">Add to Discord</a>
          <a id="dashboard" href="/dashboard">Dashboard</a>
        </div>
      </section>
    </div>

    <!-- SCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="/js/global.js"></script>
    <script src="/js/index.js"></script>
  </body>
</html>
